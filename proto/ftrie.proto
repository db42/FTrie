syntax = "proto3";
package ftrie;

service Greeter {
    rpc GetPrefixMatch (HelloRequest) returns (HelloReply);
    rpc PutWord (PutWordRequest) returns (PutWordReply);
}

message HelloRequest {
    string name = 1;
    string tenant = 2;
    uint32 top_k = 3;
}

message HelloReply {
    string message = 1;
    repeated string matches = 2;
    string node_id = 3;
}

message PutWordRequest {
    string word = 1;
    string tenant = 2;
}

message PutWordReply {
    bool applied = 1;
    string message = 2;
}
