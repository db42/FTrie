syntax = "proto3";

package raft;

// Minimal envelope: we send/receive Raft RPCs as opaque bincode blobs.
// This avoids having to mirror OpenRaft's request/response structs in protobuf.
message RaftBytes {
  bytes payload = 1;
}

service Raft {
  rpc AppendEntries(RaftBytes) returns (RaftBytes);
  rpc Vote(RaftBytes) returns (RaftBytes);
  rpc InstallSnapshot(RaftBytes) returns (RaftBytes);
}

